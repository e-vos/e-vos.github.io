---
layout: default
---

<section class="post">
  <span class="meta">
    <div class="d-flex justify-content-between">
      <div><h3>{{ page.title }}</h3></div>
      <div><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time></div>
    </div>
  </span>
  {{ content }}
</section>
