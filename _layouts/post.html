---
layout: default
---
<style>
  .someClass {
     display: flex;
     justify-content: space-between;
  }
</style>

<section class="post">
  <span class="meta">
    <div class="someClass">
      <div>{{ page.title }}</div>
      <div><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time></div>
    </div>
  </span>
  {{ content }}
</section>
